<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteNode.js | frontpage</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-150 dark:bg-gray-950 text-black dark:text-white">

  <!-- Header for my doucmentation site -->
  <header
    class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-800 bg-gray-150 dark:bg-gray-900">
    <a href="/" class="text-grey font-bold text-xl">
      NoteNode<span class="text-blue-400">.js</span>
    </a>

      <a href="/about"
        class="text-gray-600 hover:text-black dark:text-gray-400 dark:hover:text-white transition-colors">About</a>
      <button id="theme-toggle" class="text-gray-400 hover:text-white transition-colors">

      </button>

  </header>




  <div class="flex">

      class="w-64 h-screen sticky top-0 border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4">

      <nav class="flex flex-col gap-1" id="side-nav-bar">

      </nav>

    <!-- Main content on frontpage  -->

    <main id="main-section" class="flex-1 p-8">

    </main>

  <script>
    tailwind.config = {

  <script src="assets/js/header.js"></script>
